name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
      - '.github/workflows/**'      # ← AJOUTÉ : déclencher si workflow change
  pull_request:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
      - '.github/workflows/**'      # ← AJOUTÉ

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cotation-server    # ← Reste correct

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./cotation-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./cotation-server/coverage/

      - name: Build application
        run: npm run build