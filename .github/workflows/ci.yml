name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cotation-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # SUPPRIMÉ: cache-dependency-path qui cause l'erreur
          # Le cache sera géré automatiquement

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./cotation-server/coverage/

      - name: Build application
        run: npm run build