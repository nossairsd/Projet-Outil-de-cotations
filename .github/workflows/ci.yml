name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cotation-server

    env:
      DATABASE_URL: "file:./test.db"
      JWT_SECRET: "test-secret-key-for-ci"
      NODE_ENV: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # CORRECTION: Supprimer "cache: false" complètement
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # PAS DE LIGNE CACHE DU TOUT

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        run: npm test

      - name: Check coverage directory
        if: always()
        run: |
          ls -la
          ls -la coverage/ 2>/dev/null || echo "Coverage folder not found"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Build application
        run: npm run build