name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cotation-server

    env:
      DATABASE_URL: "file:./test.db"
      JWT_SECRET: "test-secret-key-for-ci"
      NODE_ENV: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          # Correction 1: chemin relatif depuis root, pas depuis working-directory
          cache-dependency-path: 'cotation-server/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations (Test DB)
        run: npx prisma migrate deploy

      - name: Run tests with verbose output
        run: npm test -- --reporter=verbose

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          # Correction 2: chemin relatif depuis root du repo
          path: cotation-server/coverage/

      - name: Build application
        run: npm run build