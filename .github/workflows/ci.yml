name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cotation-server/**'

jobs:
  test:
    runs-on: ubuntu-latest  # ← Correction: "runs-on" pas "run-on"

    defaults:
      run:
        working-directory: ./cotation-server  # ← Correction: "./" au début

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4  # ← Correction: v4 pas v3
        with:
          node-version: '20'  # ← Correction: '20' pas '24'
          cache: 'npm'
          cache-dependency-path: ./cotation-server/package-lock.json  # ← Correction: chemin

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./cotation-server/coverage/

      - name: Build application
        run: npm run build